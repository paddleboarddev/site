<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="icon" type="image/svg+xml" href="{{ "paddleboard_logo.svg" | relURL }}">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ "/" | relURL }}">
      <img class="brand-logo" src="{{ "paddleboard_logo.svg" | relURL }}" alt="PaddleBoard logo" width="32" height="32">
      <span>PaddleBoard</span>
    </a>
    <nav>
      <a href="{{ .Site.Params.docs }}">Docs</a>
      <a href="{{ .Site.Params.repo }}">GitHub</a>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <p>PaddleBoard is a fork of <a href="https://zed.dev">Zed</a>, distributed under Zed's original licenses.</p>
    <p>© {{ now.Year }} paddleboarddev</p>
  </footer>
</body>
</html>
