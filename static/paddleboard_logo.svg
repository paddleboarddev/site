<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient (Dark macOS-style Squircle) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D3250"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>

    <!-- Board Gradient (Ocean Blues) -->
    <linearGradient id="board" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89DCEB"/>
      <stop offset="100%" stop-color="#89B4FA"/>
    </linearGradient>

    <!-- Paddle Gradient (Sunset / Tech Accents) -->
    <linearGradient id="paddle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F9E2AF"/>
      <stop offset="100%" stop-color="#F38BA8"/>
    </linearGradient>

    <!-- Soft Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- macOS App Icon Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- The Paddleboard -->
  <g transform="rotate(-15 256 256)" filter="url(#shadow)">
    <!-- Main Board -->
    <rect x="186" y="66" width="140" height="380" rx="70" fill="url(#board)"/>

    <!-- Deck pad (The grip area) -->
    <rect x="206" y="166" width="100" height="220" rx="20" fill="#1E1E2E" opacity="0.15"/>

    <!-- Center stripe -->
    <rect x="252" y="66" width="8" height="380" fill="#1E1E2E" opacity="0.2"/>

    <!-- Subtle Code Brackets `< >` on Deck Pad -->
    <g opacity="0.3">
      <path d="M 235 246 L 215 276 L 235 306" stroke="#1E1E2E" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M 277 246 L 297 276 L 277 306" stroke="#1E1E2E" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- The Paddle -->
  <g transform="rotate(25 256 256)" filter="url(#shadow)">
    <!-- Paddle Blade (Teardrop shape) -->
    <path d="M 256 46 C 286 46, 286 126, 264 146 L 248 146 C 226 126, 226 46, 256 46 Z" fill="url(#paddle)"/>

    <!-- Paddle Shaft -->
    <line x1="256" y1="140" x2="256" y2="440" stroke="url(#paddle)" stroke-width="16" stroke-linecap="round"/>

    <!-- Paddle Handle (T-grip) -->
    <rect x="226" y="432" width="60" height="16" rx="8" fill="url(#paddle)"/>
  </g>
</svg>
