baseURL = "https://paddleboard.dev/"
title = "PaddleBoard"
enableRobotsTXT = true
# Source <lastmod> in the sitemap from git commit dates (the deploy checks out
# full history, fetch-depth: 0).
enableGitInfo = true
disableKinds = ["taxonomy", "term"]

[languages.en]
  locale = "en-US"
  label = "English"
  weight = 1

[markup.goldmark.renderer]
  unsafe = true

[params]
  # SEO: front-load the terms people search ("open source AI IDE", "AI harness").
  seotitle = "Open-Source AI IDE & Coding-Agent Harness"
  description = "PaddleBoard is an open-source AI IDE and harness for coding agents — define who your agent should be with PERSONA.md, bring your own model keys, and manage agents, skills, and MCP servers. Telemetry off by default."
  keywords = "open source AI IDE, open source AI harness, AI IDE, AI code editor, agentic IDE, coding agent harness, AI agent workbench, agentic coding, AI agent persona, PERSONA.md, MCP client, bring your own key LLM, Zed fork, local-first AI editor"
  tagline = "The open-source AI IDE you actually own."
  subtitle = "PaddleBoard is an open-source, AI-native IDE — a local-first harness for coding agents. Tell your agent who to be with a PERSONA.md, bring your own model keys, and manage agents, skills, and MCP servers from one place. No telemetry, no hosted plan."
  repo = "https://github.com/paddleboarddev/paddleboard"
  docs = "https://docs.paddleboard.dev"
  bluesky = "https://bsky.app/profile/paddleboard.dev"
  # Latest published release. Bump on each release (the tag must exist at repo/releases/tag/<version>).
  version = "v0.1.17"

  [[params.features]]
    icon = "🌐"
    title = "100% Open Source"
    body = "Every line is public — the editor, the docs, even the deploy playbooks. Fork it, audit it, own it. No hosted plan, no black boxes."

  [[params.features]]
    icon = "🔑"
    title = "Bring your own keys"
    body = "OpenAI, Anthropic, Google Gemini, AWS Bedrock, and more. No hosted plan, no upsells — you own the relationship with your model provider."

  [[params.features]]
    icon = "🔒"
    title = "Private by default"
    body = "Telemetry is hard-disabled at the source — events never queue, never log, never leave your machine. Even spelling and grammar checking runs fully offline. No account required."

  [[params.features]]
    icon = "🛟"
    title = "AI Dock"
    body = "Install and manage agents, skills, personas, and MCP servers from one place — with live logs and an orchestration panel for parallel work."

  [[params.features]]
    icon = "🎭"
    title = "Personas"
    body = 'Skills say what your agent can do — a PERSONA.md says who it should be. Describe a Senior Dev, an SRE, or a QA engineer and every thread holds that identity, with any model. Or just ask: "be my QA tester."'

  [[params.features]]
    icon = "🤖"
    title = "Agent workbench"
    body = "A first-class agent panel with delegation, plus support for ADK, LangGraph, CrewAI, and AutoGen agent frameworks out of the box."

  [[params.features]]
    icon = "🛡️"
    title = "Agent Sandbox"
    body = 'Agent-run code executes in ephemeral <a href="https://podman.io">Podman</a> containers under the <a href="https://gvisor.dev">gVisor</a> kernel sandbox — your project mounts in, your host stays out. Every command still passes your approve/deny gate.'

  [[params.features]]
    icon = "⛵"
    title = "Set Sail"
    body = 'Serverless-first deploys: ship straight to <a href="https://cloud.run">Cloud Run</a>, <a href="https://aws.amazon.com/pm/lambda">AWS Lambda</a>, or <a href="https://vercel.com">Vercel</a> in one click — the agent follows the open-source <a href="https://s8sskills.com">s8sskills</a> playbook and hands you the helm for auth.'

  [[params.features]]
    icon = "⚓"
    title = "Built on Zed"
    body = "All of Zed's speed and multibuffer editing, inherited and kept in sync — with PaddleBoard's AI-native additions layered on top."
